trigger:
  branches:
    include:
      - main
 
variables:
  pythonVersion: '3.10'
  azureSubscription: 'Azure subscription 1'
  webAppName: 'finops-web-app-myapp'
 
stages:
  # ============================================
  # BUILD & TEST STAGE
  # ============================================
  - stage: Build
    displayName: 'Build and Test'
    jobs:
      - job: BuildJob
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
 
          - script: |
              cd app
              pip install -r requirements.txt
              pytest tests/ --junitxml=../reports/test-results.xml
            displayName: 'Run Unit Tests'
 
          - task: PublishTestResults@2
            condition: always()
            inputs:
              testResultsFiles: 'reports/test-results.xml'
              testRunTitle: 'Unit Tests'
 
          - task: ArchiveFiles@2
            inputs:
              rootFolderOrFile: 'app'
              archiveFile: '$(Build.ArtifactStagingDirectory)/app.zip'
 
          - publish: $(Build.ArtifactStagingDirectory)/app.zip
            artifact: drop
 
  # ============================================
  # CODE QUALITY STAGE
  # ============================================
  - stage: Quality
    displayName: 'Code Quality Check'
    dependsOn: Build
    jobs:
      - job: SonarCloud
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: SonarCloudPrepare@1
            inputs:
              SonarCloud: 'SonarCloudConnection'
              organization: 'sgdesai007'
              projectKey: 'sgdesai007_CICD_BulletProof'
              projectName: 'CICD_BulletProof'
 
          - task: SonarCloudAnalyze@1
           
          - task: SonarCloudPublish@1
            inputs:
              pollingTimeoutSec: '300'
 
  # ============================================
  # DEPLOY STAGE
  # ============================================
  - stage: Deploy
    displayName: 'Deploy to Azure'
    dependsOn: Quality
    jobs:
      - deployment: DeployWeb
        environment: 'production'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    appName: '$(webAppName)'
                    package: '$(Pipeline.Workspace)/drop/app.zip'
